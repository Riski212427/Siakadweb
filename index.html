<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD Universitas Pamulang - Informatika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-gray-800">

    <!-- PANEL LOGIN -->
    <div id="page-login" class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl space-y-6">
            <div class="text-center">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black mx-auto mb-3">UNPAM</div>
                <h2 class="text-xl font-bold text-gray-900">SIAKAD INFORMATIKA</h2>
                <p class="text-xs text-gray-400 mt-1">Username: <span class="text-blue-600 font-bold font-mono">mahasiswa</span> atau <span class="text-blue-600 font-bold font-mono">dosen</span></p>
            </div>
            <form onsubmit="handleLogin(); return false;" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Username</label>
                    <input type="text" id="username" required placeholder="Masukkan role..." class="w-full px-4 py-2.5 rounded-lg border text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-2.5 rounded-lg border text-sm focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold text-sm py-3 rounded-lg hover:bg-blue-500 transition-all shadow-md">Masuk</button>
            </form>
        </div>
    </div>
    <!-- LAYOUT UTAMA -->
    <div id="main-layout" class="min-h-screen flex hidden">
        <!-- Sidebar Kiri -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col justify-between shrink-0 no-print">
            <div class="p-5 space-y-6">
                <!-- Branding Kampus -->
                <div class="flex items-center space-x-3 border-b border-slate-800 pb-4">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black text-sm">U</div>
                    <div>
                        <h1 class="text-sm font-bold text-white leading-none">SIAKAD UNPAM</h1>
                        <span class="text-[10px] text-slate-500 font-mono">v2.0.26</span>
                    </div>
                </div>
                <!-- Identitas User Login -->
                <div class="bg-slate-950 p-3.5 rounded-lg border border-slate-800/60">
                    <p id="user-display-name" class="text-sm font-bold text-white truncate">-</p>
                    <p id="user-display-role" class="text-[10px] text-amber-400 font-mono font-bold tracking-wider uppercase mt-0.5">-</p>
                </div>
                <!-- Navigasi Menu Dinamis -->
                <nav id="sidebar-menu" class="space-y-1.5"></nav>
            </div>
            <!-- Tombol Keluar -->
            <div class="p-5 border-t border-slate-800">
                <button onclick="handleLogout()" class="w-full bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white flex items-center justify-center space-x-2 py-2.5 text-sm font-bold rounded-md transition-all">
                    <i class="fa-solid fa-right-from-bracket"></i><span>Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Area Konten Utama -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <!-- Header Atas -->
            <header class="bg-white h-16 border-b border-gray-200 flex items-center justify-between px-8 shrink-0 no-print">
                <h2 id="content-title" class="font-bold text-gray-800 text-lg">Dashboard Utama</h2>
                <span class="text-xs font-medium text-gray-400 bg-gray-100 px-3 py-1 rounded-full font-mono">Semester Genap</span>
            </header>
            <!-- Konten Dinamis -->
            <div id="content-area" class="flex-1 p-8"></div>
        </main>
    </div>
    <script>
        // 1. STATE DATABASE (DATA UTAMA)
        let currentUser = null;

        let dataMahasiswa = { 
            nim: "202601001", 
            nama: "Riski Romdoni", 
            prodi: "Teknik Informatika",
            ipkLalu: 3.45 
        };
        
        let dataDosen = { nama: "Dr. Budi Utomo" };

        let dataMatakuliah = [
            { id: "MK01", kode: "INF-401", nama: "Pengolahan Citra Digital", sks: 3, hari: "Senin", jam: "08:00 - 10:30", dosen: "Dr. Budi Utomo" },
            { id: "MK02", kode: "INF-402", nama: "Artificial Intelligence", sks: 3, hari: "Senin", jam: "10:45 - 13:15", dosen: "Dr. Budi Utomo" },
            { id: "MK03", kode: "INF-403", nama: "Pemrograman Web Lanjut", sks: 4, hari: "Selasa", jam: "08:00 - 11:20", dosen: "Hendra Wijaya, M.T." },
            { id: "MK04", kode: "INF-404", nama: "Etika Profesi IT", sks: 2, hari: "Senin", jam: "08:00 - 09:40", dosen: "Dr. Budi Utomo" }
        ];

        let krsMahasiswa = [
            { id: "MK01", nilaiAngka: 85 }
        ];
        // 2. SISTEM AUTHENTICATION (LOGIN/LOGOUT)
        function handleLogin() {
            const usernameInput = document.getElementById('username').value.toLowerCase();
            
            if (['dosen', 'mahasiswa'].includes(usernameInput)) {
                currentUser = {
                    role: usernameInput,
                    name: usernameInput === 'mahasiswa' ? dataMahasiswa.nama : dataDosen.nama
                };
                
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('main-layout').classList.remove('hidden');
                
                renderMenu();
                switchPage('dashboard');
            } else {
                alert('Gunakan username: mahasiswa atau dosen');
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('page-login').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // 3. GENERATOR SIDEBAR MENU
        function renderMenu() {
            const menuBox = document.getElementById('sidebar-menu');
            document.getElementById('user-display-name').innerText = currentUser.name;
            document.getElementById('user-display-role').innerText = currentUser.role.toUpperCase();

            let menuHTML = `
                <button onclick="switchPage('dashboard')" class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 text-left transition-colors">
                    <i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard</span>
                </button>
            `;

            if (currentUser.role === 'mahasiswa') {
                menuHTML += `
                    <button onclick="switchPage('krs')" class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 text-left transition-colors">
                        <i class="fa-solid fa-file-pen w-5"></i><span>Isi KRS</span>
                    </button>
                    <button onclick="switchPage('khs')" class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 text-left transition-colors">
                        <i class="fa-solid fa-file-invoice w-5"></i><span>KHS & Nilai</span>
                    </button>
                `;
            } else if (currentUser.role === 'dosen') {
                menuHTML += `
                    <button onclick="switchPage('input-nilai')" class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 text-left transition-colors">
                        <i class="fa-solid fa-pen-to-square w-5"></i><span>Input Nilai</span>
                    </button>
                `;
            }

            menuHTML += `
                <button onclick="switchPage('profil')" class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 text-left transition-colors border-t border-slate-800 mt-2 pt-2">
                    <i class="fa-solid fa-user-gear w-5 text-amber-400"></i><span>Profil Akun</span>
                </button>
            `;

            menuBox.innerHTML = menuHTML;
        }

        function dapatkanMaxSKS(ipk) {
            if (ipk >= 3.00) return 24;
            if (ipk >= 2.50) return 21;
            return 18;
        }
        // 4. ROUTER NAVIGASI HALAMAN (switchPage)
        function switchPage(pageName) {
            const contentArea = document.getElementById('content-area');
            const titleArea = document.getElementById('content-title');
            
            // TAMPILAN: DASHBOARD UTAMA
            if (pageName === 'dashboard') {
                titleArea.innerText = "Dashboard Utama";
                const totalSKSBerjalan = krsMahasiswa.reduce((total, item) => {
                    const mk = dataMatakuliah.find(m => m.id === item.id);
                    return total + (mk ? mk.sks : 0);
                }, 0);
                const jumlahMatkul = krsMahasiswa.length;

                if (currentUser.role === 'mahasiswa') {
                    contentArea.innerHTML = `
                        <div class="space-y-6">
                            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 rounded-xl text-white shadow-sm">
                                <h2 class="text-2xl font-bold">Selamat Datang, ${currentUser.name}!</h2>
                                <p class="text-blue-100 text-sm mt-1">NIM: ${dataMahasiswa.nim} | Jurusan ${dataMahasiswa.prodi}</p>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex items-center space-x-4">
                                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg text-xl"><i class="fa-solid fa-book-open"></i></div>
                                    <div>
                                        <p class="text-xs text-gray-400 uppercase font-bold">Kelas Diambil</p>
                                        <p class="text-xl font-bold text-gray-800">${jumlahMatkul} Matakuliah</p>
                                    </div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex items-center space-x-4">
                                    <div class="p-3 bg-emerald-50 text-emerald-600 rounded-lg text-xl"><i class="fa-solid fa-graduation-cap"></i></div>
                                    <div>
                                        <p class="text-xs text-gray-400 uppercase font-bold">Total SKS</p>
                                        <p class="text-xl font-bold text-gray-800">${totalSKSBerjalan} SKS</p>
                                    </div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex items-center space-x-4">
                                    <div class="p-3 bg-amber-50 text-amber-600 rounded-lg text-xl"><i class="fa-solid fa-star"></i></div>
                                    <div>
                                        <p class="text-xs text-gray-400 uppercase font-bold">IPK Terakhir</p>
                                        <p class="text-xl font-bold text-gray-800">${dataMahasiswa.ipkLalu.toFixed(2)}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const kelasDosen = dataMatakuliah.filter(m => m.dosen === currentUser.name).length;
                    contentArea.innerHTML = `
                        <div class="space-y-6">
                            <div class="bg-gradient-to-r from-slate-800 to-slate-900 p-6 rounded-xl text-white shadow-sm">
                                <h2 class="text-2xl font-bold">Selamat Datang, ${currentUser.name}!</h2>
                                <p class="text-slate-400 text-sm mt-1">Akses Penilaian Akademik Dosen Tetap</p>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex items-center space-x-4">
                                    <div class="p-3 bg-indigo-50 text-indigo-600 rounded-lg text-xl"><i class="fa-solid fa-chalkboard-user"></i></div>
                                    <div>
                                        <p class="text-xs text-gray-400 uppercase font-bold">Kelas Diampu</p>
                                        <p class="text-xl font-bold text-gray-800">${kelasDosen} Kelas Kuliah</p>
                                    </div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex items-center space-x-4">
                                    <div class="p-3 bg-rose-50 text-rose-600 rounded-lg text-xl"><i class="fa-solid fa-users"></i></div>
                                    <div>
                                        <p class="text-xs text-gray-400 uppercase font-bold">Total Mahasiswa Bimbingan</p>
                                        <p class="text-xl font-bold text-gray-800">1 Mahasiswa</p>
                                        <span class="text-[10px] text-gray-400 font-mono">(${dataMahasiswa.nama})</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } 
            
            // TAMPILAN: HALAMAN ISI KRS MAHASISWA
            else if (pageName === 'krs') {
                titleArea.innerText = "Kartu Rencana Studi (KRS)";
                const batasMaksimalSKS = dapatkanMaxSKS(dataMahasiswa.ipkLalu);
                const totalSKSBerjalan = krsMahasiswa.reduce((total, item) => {
                    const mk = dataMatakuliah.find(m => m.id === item.id);
                    return total + (mk ? mk.sks : 0);
                }, 0);

                let krsHTML = `
                    <div class="space-y-4">
                        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 text-blue-800 text-sm flex justify-between items-center rounded-r border-y border-r border-blue-200">
                            <div>IPK Lalu: <b>${dataMahasiswa.ipkLalu}</b> | Kuota Jatah Maksimal: <b>${batasMaksimalSKS} SKS</b></div>
                            <div class="font-bold text-base">Terpakai: ${totalSKSBerjalan} / ${batasMaksimalSKS} SKS</div>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <table class="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr class="bg-gray-100 font-semibold text-gray-600 border-b border-gray-200">
                                        <th class="p-4 w-12 text-center">Pilih</th>
                                        <th class="p-4">Mata Kuliah</th>
                                        <th class="p-4 text-center">SKS</th>
                                        <th class="p-4">Hari & Jam Kuliah</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                `;

                dataMatakuliah.forEach(mk => {
                    const statusTerpilih = krsMahasiswa.some(item => item.id === mk.id);
                    krsHTML += `
                        <tr class="${statusTerpilih ? 'bg-blue-50/40' : 'hover:bg-gray-50/50'} transition-colors">
                            <td class="p-4 text-center">
                                <input type="checkbox" ${statusTerpilih ? 'checked' : ''} onclick="eksekusiToggleKrs('${mk.id}')" class="w-4 h-4 text-blue-600 rounded border-gray-300">
                            </td>
                            <td class="p-4">
                                <span class="font-semibold text-gray-900 block">${mk.nama}</span>
                                <span class="text-xs text-gray-400 font-mono font-bold">${mk.kode}</span>
                            </td>
                            <td class="p-4 text-center font-bold text-gray-700">${mk.sks} SKS</td>
                            <td class="p-4 text-xs text-gray-600"><b>${mk.hari}</b><br>${mk.jam}</td>
                        </tr>
                    `;
                });

                krsHTML += `</tbody></table></div></div>`;
                contentArea.innerHTML = krsHTML;
            }
            // TAMPILAN: INPUT NILAI (SISI DOSEN)
            else if (pageName === 'input-nilai') {
                titleArea.innerText = "Input Nilai Perkuliahan";
                const kelasDosen = dataMatakuliah.filter(m => m.dosen === currentUser.name);
                
                let dosenHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="p-4 bg-gray-50 border-b border-gray-200 font-bold text-gray-700">Daftar Mahasiswa Kelas Anda</div>
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-gray-100 font-semibold text-gray-600 border-b border-gray-200">
                                    <th class="p-4">Mahasiswa</th>
                                    <th class="p-4">Mata Kuliah</th>
                                    <th class="p-4 w-48">Input Nilai (0-100)</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                `;

                kelasDosen.forEach(mk => {
                    const krsItem = krsMahasiswa.find(k => k.id === mk.id);
                    dosenHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-4">
                                <span class="block font-semibold text-gray-900">${dataMahasiswa.nama}</span>
                                <span class="block text-xs font-mono text-gray-400">${dataMahasiswa.nim}</span>
                            </td>
                            <td class="p-4">
                                <span class="font-medium text-gray-800 block">${mk.nama}</span>
                                <span class="text-xs text-gray-400 font-mono">${mk.kode}</span>
                            </td>
                            <td class="p-4">
                                ${krsItem ? `
                                    <div class="flex items-center space-x-2">
                                        <input type="number" min="0" max="100" value="${krsItem.nilaiAngka}" id="nilai-input-${mk.id}" class="w-20 rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:border-blue-500">
                                        <button onclick="simpanNilaiDosen('${mk.id}')" class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded font-medium hover:bg-blue-500">Simpan</button>
                                    </div>
                                ` : `<span class="text-xs text-gray-400 italic">Belum ambil KRS</span>`}
                            </td>
                        </tr>
                    `;
                });

                dosenHTML += `</tbody></table></div>`;
                contentArea.innerHTML = dosenHTML;
            }

            // TAMPILAN: HALAMAN KHS (KARTU HASIL STUDI)
            else if (pageName === 'khs') {
                titleArea.innerText = "Kartu Hasil Studi (KHS)";
                renderHalamanKHS(contentArea);
            }

            // TAMPILAN: HALAMAN PROFIL AKUN
            else if (pageName === 'profil') {
                titleArea.innerText = "Profil & Biodata Pengguna";
                
                if (currentUser.role === 'mahasiswa') {
                    contentArea.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center flex flex-col items-center">
                                <div class="w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl font-bold mb-4 shadow-inner border border-blue-200">RR</div>
                                <h3 class="text-lg font-bold text-gray-900">${dataMahasiswa.nama}</h3>
                                <p class="text-sm font-mono font-bold text-gray-400 mt-0.5">${dataMahasiswa.nim}</p>
                                <span class="mt-3 px-3 py-1 bg-emerald-100 text-emerald-800 text-xs font-bold rounded-full">Aktif Perkuliahan</span>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
                                <h4 class="font-bold text-gray-700 border-b pb-2"><i class="fa-solid fa-address-card mr-2 text-blue-500"></i>Informasi Akademik</h4>
                                <div class="text-sm space-y-2">
                                    <p class="text-gray-500">Program Studi: <b class="text-gray-800 block">${dataMahasiswa.prodi}</b></p>
                                    <p class="text-gray-500">Fakultas: <b class="text-gray-800 block">Teknik & Ilmu Komputer</b></p>
                                    <p class="text-gray-500">Dosen Wali: <b class="text-gray-800 block">Dr. Budi Utomo</b></p>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
                                <h4 class="font-bold text-gray-700 border-b pb-2"><i class="fa-solid fa-wallet mr-2 text-amber-500"></i>Status Registrasi</h4>
                                <div class="text-sm space-y-3">
                                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded border border-gray-100">
                                        <span class="text-gray-500">Biaya Kuliah (UKT)</span>
                                        <span class="font-bold text-emerald-600 text-xs bg-emerald-50 px-2 py-0.5 rounded border border-emerald-200">LUNAS</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded border border-gray-100">
                                        <span class="text-gray-500">Registrasi Semester</span>
                                        <span class="font-bold text-emerald-600 text-xs bg-emerald-50 px-2 py-0.5 rounded border border-emerald-200">DISETUJUI</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    contentArea.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center flex flex-col items-center justify-center">
                                <div class="w-24 h-24 bg-slate-100 text-slate-700 rounded-full flex items-center justify-center text-3xl font-bold mb-4 border border-gray-200">BU</div>
                                <h3 class="text-lg font-bold text-gray-900">${currentUser.name}</h3>
                                <p class="text-sm font-mono text-gray-400 mt-0.5">NIDN: 0424117501</p>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
                                <h4 class="font-bold text-gray-700 border-b pb-2"><i class="fa-solid fa-briefcase mr-2 text-blue-500"></i>Jabatan & Ikatan Kerja</h4>
                                <div class="text-sm space-y-2">
                                    <p class="text-gray-500">Jabatan Akademik: <b class="text-gray-800 block">Lektor Kepala</b></p>
                                    <p class="text-gray-500">Status Pegawai: <b class="text-gray-800 block">Dosen Tetap Kampus</b></p>
                                    <p class="text-gray-500">Homebase Prodi: <b class="text-gray-800 block">Teknik Informatika</b></p>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        }
        // 5. LOGIKA CHECKLIST KRS & SENSOR AKADEMIK
        function eksekusiToggleKrs(mkId) {
            const targetMK = dataMatakuliah.find(m => m.id === mkId);
            const indexUrutan = krsMahasiswa.findIndex(item => item.id === mkId);
            
            if (indexUrutan > -1) {
                krsMahasiswa.splice(indexUrutan, 1);
                switchPage('krs');
                return;
            }

            const kuotaMaksimal = dapatkanMaxSKS(dataMahasiswa.ipkLalu);
            const totalSKSTerpakai = krsMahasiswa.reduce((total, item) => {
                const mk = dataMatakuliah.find(m => m.id === item.id);
                return total + (mk ? mk.sks : 0);
            }, 0);

            if (totalSKSTerpakai + targetMK.sks > kuotaMaksimal) {
                alert(`Gagal Ambil! SKS Anda tidak mencukupi. Batas maksimal hanya ${kuotaMaksimal} SKS.`);
                switchPage('krs');
                return;
            }

            let terdeteksiBentrok = false;
            krsMahasiswa.forEach(item => {
                const mkSudahAmbil = dataMatakuliah.find(m => m.id === item.id);
                if (mkSudahAmbil && mkSudahAmbil.hari === targetMK.hari && mkSudahAmbil.jam === targetMK.jam) {
                    terdeteksiBentrok = true;
                }
            });

            if (terdeteksiBentrok) {
                alert(`Gagal Ambil! Jadwal matakuliah ini bentrok dengan kelas lain.`);
                switchPage('krs');
                return;
            }

            krsMahasiswa.push({ id: mkId, nilaiAngka: 0 });
            switchPage('krs');
        }

        // 6. LOGIKA INPUT NILAI DOSEN
        function simpanNilaiDosen(mkId) {
            const elemenInput = document.getElementById(`nilai-input-${mkId}`);
            const nilaiBaru = parseInt(elemenInput.value);

            if (isNaN(nilaiBaru) || nilaiBaru < 0 || nilaiBaru > 100) {
                alert("Nilai harus berupa angka di antara rentang 0 sampai 100!");
                return;
            }

            const itemKrs = krsMahasiswa.find(k => k.id === mkId);
            if (itemKrs) {
                itemKrs.nilaiAngka = nilaiBaru;
                alert("Nilai mahasiswa sukses disimpan!");
                switchPage('input-nilai');
            }
        }

        // 7. HELPER KALKULASI & RENDER KHS + FITUR PRINT
        function konversiHurufDanBobot(angka) {
            if (angka >= 80) return { huruf: 'A', bobot: 4.0 };
            if (angka >= 70) return { huruf: 'B', bobot: 3.0 };
            if (angka >= 60) return { huruf: 'C', bobot: 2.0 };
            if (angka >= 50) return { huruf: 'D', bobot: 1.0 };
            return { huruf: 'E', bobot: 0.0 };
        }

        function renderHalamanKHS(contentArea) {
            let totalBobotSKS = 0;
            let totalSKSAmbil = 0;
            let barisTabelHTML = "";

            krsMahasiswa.forEach((item, index) => {
                const mk = dataMatakuliah.find(m => m.id === item.id);
                if (!mk) return;

                const konversi = konversiHurufDanBobot(item.nilaiAngka);
                const sudahDinilai = item.nilaiAngka > 0;
                
                if (sudahDinilai) {
                    totalBobotSKS += (konversi.bobot * mk.sks);
                }
                totalSKSAmbil += mk.sks;

                barisTabelHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 text-center text-gray-400">${index + 1}</td>
                        <td class="p-4 font-mono text-xs font-bold">${mk.kode}</td>
                        <td class="p-4 font-medium text-gray-900">${mk.nama}</td>
                        <td class="p-4 text-center font-semibold">${mk.sks} SKS</td>
                        <td class="p-4 text-center font-bold ${sudahDinilai ? 'text-gray-800' : 'text-gray-400 italic'}">
                            ${sudahDinilai ? item.nilaiAngka : 'Belum dinilai'}
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-0.5 rounded text-xs font-bold ${sudahDinilai ? 'bg-emerald-100 text-emerald-800' : 'bg-gray-100 text-gray-400'}">
                                ${sudahDinilai ? konversi.huruf : '-'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            const ips = totalSKSAmbil > 0 ? (totalBobotSKS / totalSKSAmbil).toFixed(2) : "0.00";
            if (parseFloat(ips) > 0) {
                dataMahasiswa.ipkLalu = parseFloat(ips);
            }

            contentArea.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-end no-print">
                        <button onclick="window.print()" class="bg-amber-500 hover:bg-amber-600 text-white font-semibold text-xs px-4 py-2 rounded shadow-xs flex items-center space-x-2 transition-colors">
                            <i class="fa-solid fa-print"></i><span>Cetak KHS Anda</span>
                        </button>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden print:border-none print:shadow-none">
                        <div class="p-6 bg-slate-800 text-white flex justify-between items-center print:bg-white print:text-black print:border-b-2 print:border-black">
                            <div>
                                <h3 class="text-lg font-bold print:text-2xl print:uppercase">Kartu Hasil Studi (KHS)</h3>
                                <p class="text-xs text-slate-400 mt-0.5 print:text-black">NIM: ${dataMahasiswa.nim} | Nama: ${dataMahasiswa.nama}</p>
                            </div>
                            <div class="text-center bg-white/10 px-4 py-2 rounded border border-white/20 print:border-black print:bg-gray-100">
                                <p class="text-[10px] uppercase tracking-wider text-slate-300 print:text-black font-bold">IPS</p>
                                <p class="text-2xl font-black text-amber-400 print:text-black">${ips}</p>
                            </div>
                        </div>
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-gray-100 font-semibold text-gray-600 border-b border-gray-200 print:bg-gray-200 print:text-black">
                                    <th class="p-4 w-12 text-center">No</th>
                                    <th class="p-4">Kode</th>
                                    <th class="p-4">Mata Kuliah</th>
                                    <th class="p-4 text-center">SKS</th>
                                    <th class="p-4 text-center">Nilai</th>
                                    <th class="p-4 text-center">Huruf</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 print:text-black">
                                ${barisTabelHTML || '<tr><td colspan="6" class="p-8 text-center text-gray-400 italic">Belum ada data krs.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
                <style>
                    @media print {
                        .no-print, aside, header { display: none !important; }
                        main { padding: 0 !important; background: white !important; overflow: visible !important; }
                        #content-area { padding: 0 !important; }
                    }
                </style>
            `;
        }
    </script>
</body>
</html>
